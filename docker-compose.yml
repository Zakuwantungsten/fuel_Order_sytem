# Fuel Order — full stack Docker Compose
# Starts: frontend (nginx) + backend (Node/Express) + Redis
# MongoDB stays on Atlas cloud — no local container needed
#
# First time:
#   docker compose up --build
# After first build (faster):
#   docker compose up

services:

  # ── Frontend — React built by Vite, served by nginx ──────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Backend — Node/Express/TypeScript API ─────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file: ./backend/.env
    environment:
      # These override whatever is in .env for Docker networking
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${PORT:-5000}
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ── Redis — Socket.io adapter + BullMQ queues + caching ───
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

volumes:
  redis_data:
