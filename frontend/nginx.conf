server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # cloudflared connects from localhost; restore the real client IP from
    # Cloudflare's CF-Connecting-IP so $remote_addr / X-Forwarded-For are correct.
    set_real_ip_from 127.0.0.1;
    set_real_ip_from ::1;
    real_ip_header CF-Connecting-IP;

    # Allow uploads up to 20 MB (backend multer limit is 15 MB). Without this,
    # nginx defaults to 1 MB and rejects Excel imports with 413 / 502.
    client_max_body_size 20m;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Proxy all /api requests to the backend service
    location /api {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # nginx listens on plain HTTP behind a TLS-terminating edge (Cloudflare),
        # so $scheme is always "http" and would trip the backend's production
        # HTTPS-required check. Preserve the edge's header when present.
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        # Excel imports can run 40-60s; give the backend headroom before nginx
        # gives up and returns 504/502.
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Proxy Socket.io WebSocket connections to the backend
    location /socket.io {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    # Hashed build assets (Vite output) — the filename changes on every build,
    # so these are safe to cache "forever". This is what makes deploys instant
    # for returning users without ever serving stale code.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html must NEVER be cached: it's the file that points at the current
    # hashed assets. Serving a stale index.html is what traps users on old builds.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # The service worker must also stay uncached so a redeploy takes effect.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Icons/manifest are referenced by stable (non-hashed) names, so keep them
    # uncached too — otherwise an updated icon/manifest wouldn't reach users.
    location /icons/ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # SPA fallback — all unmatched paths serve index.html. The internal rewrite
    # re-matches "location = /index.html" above, so the no-cache headers apply.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
