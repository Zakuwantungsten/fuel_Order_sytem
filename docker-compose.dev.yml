# Local development override — adds a local MongoDB container
# so you never touch Atlas/production data.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# This file EXTENDS docker-compose.yml — don't run it alone.

services:

  # ── Local MongoDB (dev only) ──────────────────────────────
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      start_period: 20s
      retries: 5

  # ── Override backend to use local MongoDB instead of Atlas ─
  backend:
    environment:
      - MONGODB_URI=mongodb://mongo:27017/fuel-order-dev
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
