server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow uploads up to 20 MB (backend multer limit is 15 MB). Without this,
    # nginx defaults to 1 MB and rejects Excel imports with 413 / 502.
    client_max_body_size 20m;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Proxy all /api requests to the backend service
    location /api {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # nginx listens on plain HTTP behind a TLS-terminating edge (Cloudflare),
        # so $scheme is always "http" and would trip the backend's production
        # HTTPS-required check. Preserve the edge's header when present.
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        # Excel imports can run 40-60s; give the backend headroom before nginx
        # gives up and returns 504/502.
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Proxy Socket.io WebSocket connections to the backend
    location /socket.io {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    # SPA fallback — all unmatched paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
