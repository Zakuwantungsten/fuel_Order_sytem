# Fuel Order — full stack Docker Compose
# Starts: frontend (nginx) + backend (Node/Express) + Redis
# MongoDB stays on Atlas cloud — no local container needed
#
# First time:
#   docker compose up --build
# After first build (faster):
#   docker compose up

services:

  # ── Frontend — React built by Vite, served by nginx ──────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Backend — Node/Express/TypeScript API ─────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file: ./backend/.env
    environment:
      # These override whatever is in .env for Docker networking
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${PORT:-5000}
      # Redis URL includes password — REDIS_PASSWORD must be set in .env or shell
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ── Redis — Socket.io adapter + BullMQ queues + caching ───
  # CVE-2025-49844 (RediShell, CVSS 10.0) mitigations:
  #   1. requirepass — authentication required; Lua RCE requires auth first
  #   2. expose (not ports) — Redis is internal only; not bound to host interface
  #   3. bind 127.0.0.1 — only loopback + Docker bridge, no external interface
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
      --bind 0.0.0.0
      --protected-mode yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD --no-auth-warning ping"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

volumes:
  redis_data:
